<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>дә”еӯҗжЈӢеҜ№жҲҳ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .status {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        .board {
            background: #deb887;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            cursor: pointer;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-restart {
            background: #ff6b6b;
            color: white;
        }
        .btn-restart:hover {
            background: #ff5252;
            transform: scale(1.05);
        }
        .btn-share {
            background: #4ecdc4;
            color: white;
        }
        .btn-share:hover {
            background: #45b7aa;
            transform: scale(1.05);
        }
        .winner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #ffd700;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 32px;
            display: none;
            z-index: 100;
            text-align: center;
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0); }
            to { transform: translate(-50%, -50%) scale(1); }
        }
        .winner.show {
            display: block;
        }
        .info {
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>рҹҺ® дә”еӯҗжЈӢеҜ№жҲҳ</h1>
    <div class="status" id="status">еҪ“еүҚеӣһеҗҲ: й»‘ж–№</div>
    <div class="board">
        <canvas id="board" width="450" height="450"></canvas>
    </div>
    <div class="btn-group">
        <button class="btn-restart" onclick="restart()">рҹ”„ йҮҚж–°ејҖе§Ӣ</button>
        <button class="btn-share" onclick="shareGame()">рҹ“Ө еҲҶдә«й“ҫжҺҘ</button>
    </div>
    <div class="info">жҸҗзӨәпјҡзӮ№еҮ»жЈӢзӣҳиҗҪеӯҗпјҢй»‘зҷҪиҪ®жөҒдёӢжЈӢпјҢдә”еӯҗиҝһзҸ иҺ·иғңпјҒ</div>
    <div class="winner" id="winner">
        <div id="winnerText"></div>
        <button class="btn-restart" onclick="restart()" style="margin-top:20px;">еҶҚжқҘдёҖеұҖ</button>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const CELL_SIZE = 30;
        const MARGIN = 15;
        const BOARD_SIZE = 15;
        
        let board = [];
        let currentPlayer = 1; // 1: й»‘ж–№, 2: зҷҪж–№
        let gameOver = false;
        
        // еҲқе§ӢеҢ–жЈӢзӣҳ
        function initBoard() {
            board = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = 0;
                }
            }
        }
        
        // з»ҳеҲ¶жЈӢзӣҳ
        function drawBoard() {
            ctx.fillStyle = '#deb887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1;
            
            // з»ҳеҲ¶зҪ‘ж јзәҝ
            for (let i = 0; i < BOARD_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(MARGIN, MARGIN + i * CELL_SIZE);
                ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * CELL_SIZE, MARGIN + i * CELL_SIZE);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(MARGIN + i * CELL_SIZE, MARGIN);
                ctx.lineTo(MARGIN + i * CELL_SIZE, MARGIN + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }
            
            // з»ҳеҲ¶еӨ©е…ғе’ҢжҳҹдҪҚ
            const starPoints = [[3,3], [3,11], [11,3], [11,11], [7,7]];
            ctx.fillStyle = '#8b4513';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(MARGIN + x * CELL_SIZE, MARGIN + y * CELL_SIZE, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // з»ҳеҲ¶жЈӢеӯҗ
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        drawPiece(i, j, board[i][j]);
                    }
                }
            }
        }
        
        // з»ҳеҲ¶жЈӢеӯҗ
        function drawPiece(x, y, player) {
            const cx = MARGIN + x * CELL_SIZE;
            const cy = MARGIN + y * CELL_SIZE;
            
            ctx.beginPath();
            ctx.arc(cx, cy, 13, 0, Math.PI * 2);
            
            const gradient = ctx.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, 13);
            if (player === 1) {
                gradient.addColorStop(0, '#666');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ddd');
            }
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.strokeStyle = player === 1 ? '#000' : '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        
        // зӮ№еҮ»иҗҪеӯҗ
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const i = Math.round((x - MARGIN) / CELL_SIZE);
            const j = Math.round((y - MARGIN) / CELL_SIZE);
            
            if (i >= 0 && i < BOARD_SIZE && j >= 0 && j < BOARD_SIZE) {
                if (board[i][j] === 0) {
                    board[i][j] = currentPlayer;
                    drawBoard();
                    
                    if (checkWin(i, j)) {
                        showWinner(currentPlayer);
                        gameOver = true;
                    } else {
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateStatus();
                    }
                }
            }
        });
        
        // жЈҖжҹҘжҳҜеҗҰиҺ·иғң
        function checkWin(x, y) {
            const directions = [
                [[1, 0], [-1, 0]],  // ж°ҙе№і
                [[0, 1], [0, -1]],  // еһӮзӣҙ
                [[1, 1], [-1, -1]], // еҜ№и§’зәҝ
                [[1, -1], [-1, 1]]  // еҸҚеҜ№и§’зәҝ
            ];
            
            const player = board[x][y];
            
            for (const [dir1, dir2] of directions) {
                let count = 1;
                
                // жӯЈж–№еҗ‘
                let dx = dir1[0], dy = dir1[1];
                let nx = x + dx, ny = y + dy;
                while (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[nx][ny] === player) {
                    count++;
                    nx += dx;
                    ny += dy;
                }
                
                // еҸҚж–№еҗ‘
                dx = dir2[0];
                dy = dir2[1];
                nx = x + dx;
                ny = y + dy;
                while (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[nx][ny] === player) {
                    count++;
                    nx += dx;
                    ny += dy;
                }
                
                if (count >= 5) return true;
            }
            return false;
        }
        
        // жҳҫзӨәиҚwиғңиҖ…
        function showWinner(player) {
            const winnerText = document.getElementById('winnerText');
            winnerText.textContent = player === 1 ? 'рҹҸҶ й»‘ж–№иҺ·иғңпјҒ' : 'рҹҸҶ зҷҪж–№иҚwиғңпјҒ';
            document.getElementById('winner').classList.add('show');
        }
        
        // жӣҙж–°зҠ¶жҖҒжҳҫзӨә
        function updateStatus() {
            const status = document.getElementById('status');
            status.textContent = currentPlayer === 1 ? 'еҪ“еүҚеӣһеҗҲ: вҡ« й»‘ж–№' : 'еҪ“еүҚеӣһеҗҲ: вҡӘ зҷҪж–№';
        }
        
        // йҮҚж–°ејҖе§Ӣ
        function restart() {
            initBoard();
            currentPlayer = 1;
            gameOver = false;
            drawBoard();
            updateStatus();
            document.getElementById('winner').classList.remove('show');
        }
        
        // еҲҶдә«й“ҫжҺҘ
        function shareGame() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url);
                alert('й“ҫжҺҘе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ');
            } else {
                prompt('иҜ·еӨҚеҲ¶д»ҘдёӢй“ҫжҺҘеҲҶдә«з»ҷжңӢеҸӢпјҡ', url);
            }
        }
        
        // еҲқе§ӢеҢ–
        initBoard();
        drawBoard();
        updateStatus();
    </script>
</body>
</html>
